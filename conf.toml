street = "123 Main St"

[playwright]
browser = "chromium"
headless = false
viewport = { width = 1280, height = 720 }
timeout = 30000
[test_data]
target_user = "Prabhat Gupta"
reschedule_day = "27"
reschedule_time = "01:00 PM"
# Backwards date-range used by TC-CAL-043 to validate the form rejects from > to.
# Keep `filter_date_from` LATER than `filter_date_to` — the test exercises the
# invalid-range validation path.
filter_date_from = "04/20/2026"
filter_date_to = "04/10/2026"

