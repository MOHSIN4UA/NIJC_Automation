[pytest]
# NOTE: '-s' (capture=no) was removed so pytest captures stdout/stderr and
# pytest-html embeds it under each test as a "Captured stdout/stderr/log"
# section. With '-s' present, all print() output streams to the console and
# never reaches the HTML report.
addopts = --html=report/test_report.html --self-contained-html -v
# Capture logging-module output into the report too, and show INFO+ live.
log_cli = true
log_cli_level = INFO
log_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %H:%M:%S
markers =
    smoke: Quick tests for basic functionality
    regression: Full suite tests for regression testing
    manage_calendar: Calendar management regression suite
    book_appointment: Appointment booking regression suite
    manage_appointment: Manage Appointment regression suite (list view, calendar view, filters)
